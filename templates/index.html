<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Gestor de inventarios</h1>
    <form method="POST" action="/agregar" class="mb-3">
        <input type="text" name="nombre" placeholder="Nombre" class="form-control mb-2" required> <!--Formularios con "required" para validacion basica en el navegador-->
        <input type="number" name="cantidad" placeholder="Cantidad" class="form-control mb-2" required>
        <input type="number" step="0.01" name="precio" placeholder="Precio" class="form-control mb-2" required>
        <button class="btn btn-primary">Agregar</button>
    </form>
    <table class="table table-striped"> <!--table-striped Clase Boostrap para tablas con estilo automatico-->
        <th><th>ID</th><th>Nombre</th><th>Cantidad</th><th>Precios</th></th>
        {% for p in productos %}
        <tr>
            <td>{{ p.id_key }}</td>
            <td>{{ p.nombre }}</td> <!--Sintaxis jinja para mostrar datos-->
            <td>{{ p.cantidad }}</td>
            <td>{{ p.precio }}</td>
            <td>
                <a href="{{ url_for('editar', id=p.id_key) }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{{ url_for('eliminar', id=p.id_key) }}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </table> <!---->
</body>
</html>
